# Hexo Configuration - Loop Blog
## Docs: https://hexo.io/docs/configuration.html

# Site
title: Loop
subtitle: 'current flows. so do i.'
description: '电控与嵌入式学习笔记 · RM电控 · C++'
keywords: Loop,RM电控,C++,嵌入式,STM32
author: Loop
language: zh-CN
timezone: Asia/Shanghai

# URL
# GitHub Pages (free): https://IVY-0bug.github.io/loop-blog/
url: https://IVY-0bug.github.io/loop-blog
root: /loop-blog/
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: true
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

include:
exclude:
ignore:

# Extensions
theme: butterfly

# Local search (hexo-generator-searchdb)
search:
  path: search.xml
  field: post
  content: true
  format: html

# Deployment（Day 3 再配 GitHub Pages）
deploy:
  type: ''
